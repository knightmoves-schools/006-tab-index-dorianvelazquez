        <title>Tab Index</title>
    </head>
    <body>
        <form action=https://www.w3schools.com/tags/att_global_tabindex.asp>
            
            <h1>Student Intro</h1>

            <input type="text" placeholder="Dorian" tabindex="2">
                <br/><br/>

                <strong>Favorite Ice Cream Flavor</strong>
                <br/>

                <input id="vanilla-icevream" type="checkbox"
                    name="favorite-icecream" value="vanilla" tabindex="4">
                    <label for="vanilla-icecream">Vanilla</label>

                <input id="chocolate-icecream" type="checkbox"
                    name="favorite-icecream" value="chocolate" tabindex="3">
                    <label for="chocolate-icecream">Chocolate</label>
                
                <input id="swirl-icecream" type="checkbox"
                    name="favorite-icecream" value="swirl" tabindex="5">
                <label for="swirl-icecream">Swirl</label>
                <br/><br/>

<input type="text" placeholder="age" tabindex="1">
<br/><br/>

                <button type="submit" tabindex+="6">Submit</button>
        form>
